kind: ContingentFeatureMarkers
features: ["tam", "deixis"]
markers:
- features: {tam: imperfective, deixis: itive}
  realization:
  - {kind: rule, value: $set_hl_melody, order: tone_melody}
- features: {tam: imperfective, deixis: ventive}
  realization:
  - {kind: rule, value: $set_all_low_tone, order: tone_melody}
- features: {tam: perfective, deixis: itive}
  realization:
  - {kind: rule, value: $set_hl_melody, order: tone_melody}
- features: {tam: perfective, deixis: ventive}
  realization:
  - {kind: rule, value: $set_all_low_tone, order: tone_melody}
