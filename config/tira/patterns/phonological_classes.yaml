kind: Patterns
patterns:
  - Non-High vowel: 
      pattern: "(<V_Mid>|<V_Low>)"
      _ref: "<V_NonHigh>"
      test_includes: ["a", "e", "o", "ɛ", "ɔ"]
      test_excludes: ["i", "u", "t", "k", "s"]
  - Coronal obstruent:
      pattern: "(t|d|s|t̪|d̪)"
      _ref: "<CorObs>"
      test_includes: ["t", "d", "s", "t̪", "d̪"]
      test_excludes: ["k", "g", "m", "n", "l"]
  - Velar stop:
      pattern: "(k|g)"
      _ref: "<VelStop>"
      test_includes: ["k", "g"]
      test_excludes: ["t", "d", "s", "t̪", "d̪", "m", "n", "l"]