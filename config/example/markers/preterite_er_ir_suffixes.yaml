# Preterite suffixes for -er and -ir verbs (identical endings)
# comer: comí, comiste, comió, comimos, comisteis, comieron
# vivir: viví, viviste, vivió, vivimos, vivisteis, vivieron
kind: FeatureMarkers
feature: person_number
global_order: suffixation
markers:
  1sg:
    type: suffix
    value: "-í"
  2sg:
    type: suffix
    value: "-iste"
  3sg:
    type: suffix
    value: "-ió"
  1pl:
    type: suffix
    value: "-imos"
  2pl:
    type: suffix
    value: "-isteis"
  3pl:
    type: suffix
    value: "-ieron"
