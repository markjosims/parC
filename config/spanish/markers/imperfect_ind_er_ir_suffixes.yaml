# Imperfect indicative suffixes for -er and -ir verbs (identical endings)
# comer: comía, comías, comía, comíamos, comíais, comían
# vivir: vivía, vivías, vivía, vivíamos, vivíais, vivían
kind: FeatureMarkers
feature: person_number
global_order: suffixation
markers:
  1sg:
    type: suffix
    value: "-ía"
  2sg:
    type: suffix
    value: "-ías"
  3sg:
    type: suffix
    value: "-ía"
  1pl:
    type: suffix
    value: "-íamos"
  2pl:
    type: suffix
    value: "-íais"
  3pl:
    type: suffix
    value: "-ían"
