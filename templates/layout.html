<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tira Morphological Parser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .result-box { min-height: 100px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900">Tira Morphological Parser</h1>
            <p class="text-lg text-gray-600 mt-2">A lightweight web interface for Tira verb analysis and inflection.</p>
        </header>

        <main class="grid md:grid-cols-2 gap-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
